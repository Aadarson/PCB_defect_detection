services:
  # 1. FastAPI Backend Server (Web Service)
  - type: web
    name: pcb-defect-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend.app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0

  # 2. Frontend Dashboard (Static Site)
  - type: web
    name: pcb-defect-dashboard
    env: static
    buildCommand: ""
    staticPublishPath: ./frontend
